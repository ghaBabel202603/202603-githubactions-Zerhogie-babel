name: 15 - Working with Artifacts
run-name: 15 - Working with Artifacts
on:
  workflow_dispatch:
env:
  build-artifact-key: app-${{ github.sha }}
  test-coverage-key: test-coverage-${{ github.sha }}
jobs:
  test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Download cached dependencies
        id: cache
        uses: actions/cache@v3
        with:
          key: deps-node-modules-${{ hashFiles('my-app/package-lock.json') }}
          path: my-app/node_modules
      - name: Install dependencies
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci
      - name: Unit tests
        run: npm run test -- --coverage
      - name: Upload test results
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env['test-coverage-key'] }}
          path: my-app/coverage
      - name: Build code
        run: npm run build
      - name: Upload build files
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env['build-artifact-key'] }}
          path: my-app/build

  deploy:
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - name: Download build files
        uses: actions/download-artifact@v6
        with:
          name: ${{ env['build-artifact-key'] }}
          path: my-app/build
      - name: Deploy
        run: echo "Deploying"
